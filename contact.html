<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - XX办公耗材</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="logo">XX办公<span>耗材</span></a>
            <div class="hamburger">
                <span></span><span></span><span></span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="products.html">产品中心</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="contact.html">联系我们</a></li>
                <li><a href="dashboard.html">数据看板</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="section-title">联系我们</h1>
        
        <div class="contact-grid">
            <div class="contact-info">
                <h3>联系方式</h3>
                <p>📞 电话：123-4567-8901</p>
                <p>📧 邮箱：sales@xxoffice.com</p>
                <p>💬 微信：xxoffice_01</p>
                <p>📍 地址：XX市XX区XX路XX号XX大厦</p>
                <p>⏰ 营业时间：周一至周五 9:00-18:00</p>
            </div>
            
            <div class="contact-form">
                <h3>在线留言</h3>
                <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    <!-- 这个隐藏字段是必须的，Netlify用它来识别表单 -->
    <input type="hidden" name="form-name" value="contact" />
    
    <!-- 蜜罐字段：防垃圾邮件，会自动隐藏，用户看不见 -->
    <p style="display:none">
        <input type="text" name="bot-field" />
    </p>
                    <input type="text" name="name" placeholder="您的姓名" required>
                    <input type="email" name="email" placeholder="您的邮箱" required>
                    <input type="text" name="phone" placeholder="联系电话">
                    <textarea name="message" placeholder="留言内容" rows="5" required></textarea>
                    <button type="submit" class="btn">提交留言</button>
                </form>
                <p style="font-size:12px; color:#999; margin-top:10px">* 提交后我们会尽快与您联系</p>
            </div>
        </div>
        
        <div class="map">
            <iframe src="https://map.baidu.com/..." width="100%" height="300" frameborder="0" style="border:0" allowfullscreen></iframe>
        </div>
    </main>

    <footer class="footer">
        <p>XX办公耗材有限公司</p>
        <p>电话：123-4567-8901 | 地址：XX市XX区XX路XX号</p>
        <p>© 2024 XX办公耗材 版权所有</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
